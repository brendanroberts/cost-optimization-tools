<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:,">
  <title>Business Services Spend Checklist | Margin Steward</title>
  <meta name="author" content="Brendan Roberts">
  <meta name="description" content="A printable checklist for financial professionals to use for periodic reviews of healthy spending patterns with vendor expenses.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <script>
    (function() {
      var stored = localStorage.getItem('ms-theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var theme = stored || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <link href="./../main.css" rel="stylesheet">
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "HowTo",
      "name": "Vendor Expense Review Checklist for Finance Professionals",
      "description": "A printable checklist to support structured vendor expense reviews, invoice accuracy checks, and operational cost stewardship. Designed for accountants and finance professionals to use during periodic spending reviews.",
      "audience": {
        "@type": "Audience",
        "audienceType": "Accounting and finance professionals"
      },
      "supply": [
        {
          "@type": "HowToSupply",
          "name": "Printable checklist (browser print or PDF export)"
        }
      ],
      "step": [
        {
          "@type": "HowToStep",
          "name": "Vendor Pricing & Contracts",
          "text": "Review vendor contracts for pricing changes, tariff impact, and service adjustments. Confirm recurring services are billed at agreed-upon rates."
        },
        {
          "@type": "HowToStep",
          "name": "Service Delivery Verification",
          "text": "Verify billed services are delivered as expected and identify duplicate services across departments."
        },
        {
          "@type": "HowToStep",
          "name": "Invoice Accuracy",
          "text": "Check invoices for errors, duplicates, and ensure discounts or credits are applied consistently."
        },
        {
          "@type": "HowToStep",
          "name": "Operational Drift",
          "text": "Evaluate whether staffing or process changes altered service usage and confirm cost increases are tracked."
        },
        {
          "@type": "HowToStep",
          "name": "Budget Health",
          "text": "Assess whether inefficiencies affect budget flexibility and whether funds could be preserved for strategic priorities."
        }
      ],
      "creator": {
        "@type": "Person",
        "name": "Brendan Roberts"
      }
    }
  </script>
</head>

<body>

  <nav>
    <a href="/" class="wordmark">Margin Steward</a>
    <div class="nav-right">
        <ul class="nav-links">
          <li><a href="/payroll-savings/" class="nav-link">Section 125</a></li>
          <li><a href="/scenario" class="nav-link">Scenario</a></li>
          <li><a href="/checklist" class="nav-link">Checklist</a></li>
        </ul>
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle light/dark mode">
          <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
  </nav>

  <div class="content-container">

    <h1>Business Services Spend Checklist</h1>
    <p class="page-subtitle">Use during routine financial reviews — monthly, quarterly, or pre-budget.</p>

    <div class="checklist-section">
      <h3>Vendor Pricing &amp; Contracts</h3>
      <div class="checklist-item">
        <input type="checkbox" id="item-1">
        <label for="item-1">Have contracts been reviewed for pricing changes, tariff impact, or service adjustments?</label>
      </div>
      <div class="checklist-item">
        <input type="checkbox" id="item-2">
        <label for="item-2">Are recurring services billed at agreed-upon rates?</label>
      </div>
    </div>

    <div class="checklist-section">
      <h3>Service Delivery Verification</h3>
      <div class="checklist-item">
        <input type="checkbox" id="item-3">
        <label for="item-3">Are all billed services delivered as expected?</label>
      </div>
      <div class="checklist-item">
        <input type="checkbox" id="item-4">
        <label for="item-4">Are any services duplicated across departments?</label>
      </div>
    </div>

    <div class="checklist-section">
      <h3>Invoice Accuracy</h3>
      <div class="checklist-item">
        <input type="checkbox" id="item-5">
        <label for="item-5">Are invoices checked for errors or duplicates?</label>
      </div>
      <div class="checklist-item">
        <input type="checkbox" id="item-6">
        <label for="item-6">Are available discounts and credits applied consistently?</label>
      </div>
    </div>

    <div class="checklist-section">
      <h3>Operational Drift</h3>
      <div class="checklist-item">
        <input type="checkbox" id="item-7">
        <label for="item-7">Has staffing or process changes altered service usage?</label>
      </div>
      <div class="checklist-item">
        <input type="checkbox" id="item-8">
        <label for="item-8">Are cost increases being tracked systematically?</label>
      </div>
    </div>

    <div class="checklist-section">
      <h3>Budget Health</h3>
      <div class="checklist-item">
        <input type="checkbox" id="item-9">
        <label for="item-9">Are small inefficiencies impacting overall budget flexibility?</label>
      </div>
      <div class="checklist-item">
        <input type="checkbox" id="item-10">
        <label for="item-10">Could discretionary funds be preserved for staffing or strategic initiatives?</label>
      </div>
    </div>

  </div>

  <footer><!-- extensible — no content at this time --></footer>

  <script>
    (function() {
      var toggle = document.getElementById('theme-toggle');
      if (toggle) {
        toggle.addEventListener('click', function() {
          var current = document.documentElement.getAttribute('data-theme');
          var next = current === 'dark' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', next);
          localStorage.setItem('ms-theme', next);
        });
      }
    })();
  </script>

</body>

</html>
