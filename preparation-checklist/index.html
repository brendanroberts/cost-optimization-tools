<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:,">
    <title>Vendor Review Preparation Checklist</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link href="./../main.css" rel="stylesheet">
    <style>
        @media print {
            nav,
            .no-print {
                display: none !important;
            }

            body {
                background: white;
            }

            .print-shadow-none {
                box-shadow: none !important;
            }
        }
    </style>
</head>

<body class="bg-gray-100 font-family-primary">
    <nav class="bg-blue-700 no-print">
        <div class="max-w-6xl px-4">
            <div class="flex justify-between">
                <div class="hidden md:flex items-center space-x-1">
                    <a href="/scenario" class="py-2 px-3 text-blue-50 hover:text-blue-200">Cost optimization scenarios</a>
                    <a href="/payroll-savings/" class="py-2 px-3 text-blue-50 hover:text-blue-200">Payroll tax savings</a>
                    <a href="/checklist" class="py-2 px-3 text-blue-50 hover:text-blue-200">Printable spend checklist</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="min-h-screen bg-gray-50 px-4 py-8">
        <div class="mx-auto max-w-3xl bg-white shadow-sm rounded-lg p-10 print-shadow-none">

            <div class="flex justify-between items-start mb-8 no-print">
                <div>
                    <h1 class="text-3xl pb-2">Vendor Review Preparation Checklist</h1>
                    <p class="text-gray-600 italic">Based on your scenario analysis</p>
                </div>
                <button onclick="window.print()"
                    class="bg-gray-100 text-gray-800 px-3 py-2 rounded-md border text-sm">Print</button>
            </div>

            <div class="print-only" style="display:none;">
                <h1 class="text-3xl pb-2">Vendor Review Preparation Checklist</h1>
            </div>

            <div id="app"></div>

        </div>
    </div>

    <script type="module" src="./preparation-checklist.js"></script>
</body>

</html>
